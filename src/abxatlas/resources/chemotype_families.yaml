# Antibacterial chemotype families for failure interpretation.
# First matching family wins as the primary label.

families:
  - id: fluoroquinolone
    label: Fluoroquinolone
    smarts:
      - "O=C(O)c1cn(*)c2cc(*)c(F)cc2c1=O"
      - "O=C(O)c1cn(*)c2ccc(F)cc2c1=O"
    reference_smiles: "O=C(O)c1cn(C2CC2)c2cc(N3CCNCC3)c(F)cc2c1=O"
    case_study: true

  - id: quinolone
    label: Quinolone
    smarts:
      - "O=C(O)c1cn(*)c2ccccc2c1=O"

  - id: glycopeptide
    label: Glycopeptide
    smarts: []
    min_mw: 1100
    require_smarts:
      - "c1ccc(Oc2ccccc2)cc1"
    min_amide_count: 5
    reference_smiles: "C[C@H](O)[C@@H]1NC(=O)[C@H](CC(=O)N)NC(=O)[C@H](CC(=O)N)NC(=O)[C@@H](NC(=O)[C@@H](CC(C)C)NC)[C@H](O)c2ccc(Oc3cc4cc(Oc5ccc(cc5Cl)[C@@H](O)[C@@H]6NC(=O)[C@H](NC(=O)[C@@H]4NC(=O)[C@H](CC(=O)N)NC6=O)c6ccc(O)c(c6)c3O)c(Cl)c2)c(O)c1"
    similarity_threshold: 0.35
    case_study: true

  - id: polymyxin
    label: Polymyxin
    smarts:
      - "NCCC(N)C(=O)N"
    min_mw: 900
    min_amide_count: 6
    reference_smiles: "CCC(C)CCCCC(=O)N[C@@H](CCN)C(=O)N[C@@H]([C@@H](C)O)C(=O)N[C@@H](CCN)C(=O)N[C@H]1CCNC(=O)[C@H]([C@@H](C)O)NC(=O)[C@H](CCN)NC(=O)[C@H](CCN)NC(=O)[C@H](CC(C)C)NC(=O)[C@@H](Cc2ccccc2)NC(=O)[C@H](CCN)NC1=O"
    similarity_threshold: 0.40
    case_study: true

  - id: beta_lactam
    label: β-lactam
    smarts:
      - "[#7]1[#6](=O)[#6][#6]1"

  - id: oxazolidinone
    label: Oxazolidinone
    smarts:
      - "O=C1OCCN1c1ccccc1"

  - id: sulfonamide
    label: Sulfonamide
    smarts:
      - "c1ccc(S(=O)(=O)N)cc1"

  - id: macrolide
    label: Macrolide
    smarts:
      - "[#6]1[#6][#6][#6][#6][#6][#6][#6][#6][#6][#6][#6][#6]C(=O)O1"

  - id: aminoglycoside
    label: Aminoglycoside
    smarts:
      - "NC1CC(N)C(O)C(O)C1O"

  - id: nitroimidazole
    label: Nitroimidazole
    smarts:
      - "c1ncn([N+](=O)[O-])c1"
      - "c1cnc([N+](=O)[O-])n1C"
