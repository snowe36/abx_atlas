# Keywords used to bucket ChEMBL target names into cell-envelope vs other.
# Matching is case-insensitive substring match on preferred target name.

cell_envelope:
  - penicillin-binding protein
  - penicillin binding protein
  - peptidoglycan
  - murA
  - murB
  - murC
  - murD
  - murE
  - murF
  - murG
  - murJ
  - mraY
  - UDP-N-acetylglucosamine
  - UDP-N-acetylmuramate
  - lipid II
  - lipid A
  - LpxA
  - LpxC
  - LpxD
  - LpxH
  - LpxK
  - BamA
  - LptD
  - LptB
  - LolC
  - LolE
  - LolD
  - outer membrane
  - cell wall
  - transpeptidase
  - D-alanyl-D-alanine
  - alanine racemase
  - FemA
  - FemB
  - FemX
  - WaaL
  - KdsA
  - KdsB
  - KdsC
  - KdsD

# Explicitly non-envelope (helps avoid false positives like "cell wall stress" assays)
exclude_from_envelope:
  - beta-lactamase
  - β-lactamase
  - DNA gyrase
  - topoisomerase
  - RNA polymerase
  - ribosome
  - ribosomal
  - dihydrofolate
  - DHFR
  - folate

